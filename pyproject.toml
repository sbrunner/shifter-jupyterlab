[tool.ruff]
target-version = "py310"
line-length = 110

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.poetry]
version = '0.0.0'

[tool.poetry.dependencies]
python = ">=3.10,<3.13"
jupyterlab = "4.4.2"
plotly = "6.1.1"
dash = "2.18.2"
shifter-pandas = "1.0.3"
pandas = "2.2.3"
statsmodels = "0.14.4"
jupyter-dash = "0.4.2"
jupyter-core = "5.7.2"
certifi = "2025.4.26"
flask = "3.1.1"
tornado = "6.5.1"
requests = "2.32.3"
urllib3 = "2.4.0"
jupyter-server = "2.16.0"
jinja2 = "3.1.6"
idna = "3.10"
python-json-logger = "3.3.0"

[project]
classifiers = [
    'Programming Language :: Python',
    'Programming Language :: Python :: 3',
    'Programming Language :: Python :: 3.10',
    'Programming Language :: Python :: 3.11',
    'Programming Language :: Python :: 3.12',
]
dynamic = ["dependencies", "version"]
name = 'shifter-jupyterlab'
description = 'Not used'
